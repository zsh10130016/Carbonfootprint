spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:carbonfootprint}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    # Local development defaults so the project can run directly from IDEA.
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:zsh20031013*}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      # Keep MySQL data intact during normal development runs.
      # Use the explicit init profile once when the schema/seed data needs bootstrapping.
      mode: never
      encoding: UTF-8

logging:
  level:
    com.zhangsihan.carbonfootprint: INFO

app:
  cors:
    allowed-origins: ${APP_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
